substitutions:
  va_cue_wake_file: "static/assist-cues/wake-soft.wav"
  va_cue_listening_end_file: "static/assist-cues/listening-soft.wav"
  va_cue_error_file: "static/assist-cues/error-soft.wav"

esphome:
  name: s3-zero-audio
  friendly_name: S3Z audio
  build_path: /tmp/esphome_remote_build
  # platformio_options:
  #     build_flags:
  #       - -DARDUINO_USB_CDC_ON_BOOT=true -DBOARD_HAS_PSRAM
  # platformio_options:
  #   build_flags: "-DBOARD_HAS_PSRAM"
  #   board_build.arduino.memory_type: qio_opi

esp32:
  board: waveshare_esp32_s3_zero # FLASH: 4MB PSRAM: 2MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    # sdkconfig_options:
        # CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
        # CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
        # CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

        # Moves instructions and read only data from flash into PSRAM on boot.
        # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
        # Considerably speeds up mWW at the cost of using more PSRAM.
        # CONFIG_SPIRAM_RODATA: "y"
        # CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

        # CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
        # CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

        # CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

# Broken VAD!
# external_components:
#   - source: github://pr#15628
#     components: [micro_wake_word]
#     refresh: 1h

external_components:
  - source: github://pr#15703
    components: [micro_wake_word]
    refresh: 1h

# http_request:
#   buffer_size_rx: 2048 

# Enable logging
# logger:
#   hardware_uart: UART0 # Use UART0 for logging instead of the default USB_CDC

logger:
  level: DEBUG

# debug:
#   update_interval: 15s

psram:
  mode: quad
  speed: 80MHz
  ignore_not_found: false
  

api:
  encryption:
    key: !secret default_native_api_encryption_key

ota:
  platform: esphome
  password: !secret default_ota_password

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  - ssid: !secret wifi_alt_ssid
    password: !secret wifi_alt_password
    priority: 32

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "S3-Zero-Audio Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:


light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    # internal: True
    pin: GPIO21
    num_leds: 1
    id: led
    name: "Status LED"
    effects:
      - pulse:
      - random:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 40%
          max_brightness: 60%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 40%
          max_brightness: 60%
# I2S Audio Component - Using available GPIO pins
i2s_audio:
  - id: i2s_audio_bus_speaker
    i2s_lrclk_pin: GPIO5 # Word Select (WS/LRCLK)
    i2s_bclk_pin: GPIO4 # Bit Clock (BCK/BCLK)
  - id: i2s_audio_bus_mic
    i2s_lrclk_pin: GPIO2 # Word Select (WS/LRCLK)
    i2s_bclk_pin: GPIO1 # Bit Clock (BCK/BCLK)

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_audio_bus_speaker
    id: external_i2s_speaker
    dac_type: external
    i2s_dout_pin: GPIO6
    channel: stereo
    sample_rate: 48000

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: external_i2s_speaker
    # task_stack_in_psram: True
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input
  - platform: resampler
    # task_stack_in_psram: True
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input
  - platform: resampler
    # task_stack_in_psram: True
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

microphone:
  - platform: i2s_audio
    i2s_audio_id: i2s_audio_bus_mic
    id: external_i2s_mic
    channel: left
    adc_type: external
    i2s_din_pin: GPIO8



media_player:
  - platform: speaker
    name: "Speaker Media Player"
    id: speaker_media_player_id
    # task_stack_in_psram: True
    volume_initial: 70%
    media_pipeline:
        speaker: media_spk_resampling_input
        num_channels: 2
    announcement_pipeline:
        speaker: announcement_spk_resampling_input
        num_channels: 1
    files:
      - id: va_cue_wake
        file: ${va_cue_wake_file}
      - id: va_cue_listening_end
        file: ${va_cue_listening_end_file}
      - id: va_cue_error
        file: ${va_cue_error_file}

    on_pause: 
      then:
        - script.execute: start_wake_word
        - script.execute: reset_led
    on_play:
      then:
        - script.execute: stop_wake_word
        - script.execute: reset_led
    on_idle:
      then:
        - script.execute: start_wake_word
        - script.execute: reset_led


voice_assistant:
  id: va
  micro_wake_word:
  microphone:
    microphone: external_i2s_mic
    channels: 0
    gain_factor: 4
  media_player: speaker_media_player_id
  noise_suppression_level: 2
  auto_gain: 28dBFS
  volume_multiplier: 2

  on_listening:
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        effect: "Slow Pulse"
  on_stt_vad_end:
    - script.execute: play_listening_end_cue
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        effect: "Fast Pulse"
  on_tts_start:
    - script.execute: stop_wake_word
    - light.turn_on:
        id: led
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
        effect: none
  on_end:
    # Handle the "nevermind" case where there is no announcement
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 15s
    # Restart only mWW if enabled; streaming wake words automatically restart
    
    - wait_until:
        - and:
            - not:
                voice_assistant.is_running:
            - not:
                speaker.is_playing:
                  id: external_i2s_speaker
    
    - script.execute: start_wake_word
    - script.execute: reset_led 
  
  on_error:
    - script.execute: play_error_cue
    - light.turn_on:
        id: led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
        effect: none
    - delay: 2s
    - light.turn_off: led
    - script.execute: reset_led 

  on_client_connected:
    - delay: 2s  # Give the api server time to settle
    - script.execute: start_wake_word
    - script.execute: reset_led 
  on_client_disconnected:
    - script.execute: stop_wake_word
    - script.execute: reset_led 


micro_wake_word:
  id: mww
  on_wake_word_detected:
    - script.execute: play_wake_cue
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
  vad:
    # probability_cutoff: 0%
    
  models:
    - model: okay_nabu


globals:
  - id: last_wake_cue_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: last_listening_end_cue_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: last_error_cue_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'


switch:
  - platform: template
    name: "Assistant Cue Sounds"
    id: assistant_cues_enabled
    icon: "mdi:music-note-outline"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config


script:
  - id: play_wake_cue
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: assistant_cues_enabled
              - not:
                  media_player.is_playing:
                    id: speaker_media_player_id
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player_id
              - lambda: |-
                  const uint32_t now = millis();
                  if (now - id(last_wake_cue_ms) < 1000) {
                    return false;
                  }
                  id(last_wake_cue_ms) = now;
                  return true;
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: va_cue_wake
                announcement: true
            - text_sensor.template.publish:
                id: last_va_cue
                state: "wake"

  - id: play_listening_end_cue
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: assistant_cues_enabled
              - not:
                  media_player.is_playing:
                    id: speaker_media_player_id
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player_id
              - lambda: |-
                  const uint32_t now = millis();
                  if (now - id(last_listening_end_cue_ms) < 1500) {
                    return false;
                  }
                  id(last_listening_end_cue_ms) = now;
                  return true;
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: va_cue_listening_end
                announcement: true
            - text_sensor.template.publish:
                id: last_va_cue
                state: "listening_end"

  - id: play_error_cue
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: assistant_cues_enabled
              - lambda: |-
                  const uint32_t now = millis();
                  if (now - id(last_error_cue_ms) < 2000) {
                    return false;
                  }
                  id(last_error_cue_ms) = now;
                  return true;
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: va_cue_error
                announcement: true
            - text_sensor.template.publish:
                id: last_va_cue
                state: "error"

  - id: reset_led
    then:
      - if:
          condition:
            - micro_wake_word.is_running
          then:
            - light.turn_on:
                id: led
                red: 100%
                green: 89%
                blue: 71%
                brightness: 60%
                effect: none
          else:
            - if:
                condition:
                  - media_player.is_idle
                then:
                  - light.turn_on:
                      id: led
                      red: 0%
                      green: 100%
                      blue: 100%
                      brightness: 60%
                      effect: none
                  - script.stop: reset_led
            - if:
                condition:
                  - media_player.is_playing
                then:
                  - light.turn_off:
                      id: led
                  - light.turn_on:
                      id: led
                      brightness: 50%
                      red: 0%
                      green: 100%
                      blue: 0%
                  - script.stop: reset_led
            - if:
                condition:
                  - media_player.is_paused
                then:
                  - light.turn_off:
                      id: led
                  - light.turn_on:
                      id: led
                      brightness: 50%
                      red: 100%
                      green: 100%
                      blue: 0%
                  - script.stop: reset_led
            - if:
                condition:
                  - media_player.is_announcing
                then:
                  - light.turn_off:
                      id: led
                  - light.turn_on:
                      id: led
                      brightness: 50%
                      red: 50%
                      green: 100%
                      blue: 100%
                      effect: pulse
                  - script.stop: reset_led
            - light.turn_off: led

  - id: start_wake_word
    then:
      - if:
          condition:
            - not:
                voice_assistant.is_running
          then:
            - micro_wake_word.start:

  - id: stop_wake_word
    then:
      - micro_wake_word.stop:


# System information diagnostic sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
  - platform: version
    name: "ESPHome Version"
  - platform: template
    name: "Last VA Cue"
    id: last_va_cue
    entity_category: diagnostic
    update_interval: never
  # - platform: debug
  #   device:
  #     name: "Device Info"
  #   reset_reason:
  #     name: "Reset Reason"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    device_class: "signal_strength"
    entity_category: diagnostic
  - platform: copy
    id: wifi_signal_percent
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    entity_category: diagnostic
    unit_of_measurement: "%"
    device_class: "signal_strength"
  - platform: internal_temperature
    name: "Internal Temperature"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    update_interval: 180s
    entity_category: diagnostic
    filters:
      - lambda: return x / 3600.0;
    unit_of_measurement: "h"

  # - platform: debug
