    jk_bms_ble_id: bms0
    
    # Cell voltage monitoring
    min_cell_voltage:
      name: "min cell voltage"
      #entity_category: diagnostic
    max_cell_voltage:
      name: "max cell voltage"
      #entity_category: diagnostic
    min_voltage_cell:
      name: "min voltage cell"
      #entity_category: diagnostic
    max_voltage_cell:
      name: "max voltage cell"
      #entity_category: diagnostic
    delta_cell_voltage:
      name: "delta cell voltage"
    average_cell_voltage:
      name: "average cell voltage"
    
    # Individual cell voltages
    cell_voltage_1:
      name: "cell voltage 1"
      #entity_category: diagnostic
    cell_voltage_2:
      name: "cell voltage 2"
      #entity_category: diagnostic
    cell_voltage_3:
      name: "cell voltage 3"
      #entity_category: diagnostic
    cell_voltage_4:
      name: "cell voltage 4"
      #entity_category: diagnostic
    cell_voltage_5:
      name: "cell voltage 5"
      #entity_category: diagnostic
    cell_voltage_6:
      name: "cell voltage 6"
      #entity_category: diagnostic
    cell_voltage_7:
      name: "cell voltage 7"
      #entity_category: diagnostic
    cell_voltage_8:
      name: "cell voltage 8"
      #entity_category: diagnostic

    
    # Cell resistance (BLE provides this, UART doesn't!)
    cell_resistance_1:
      name: "cell resistance 1"
      #entity_category: diagnostic
    cell_resistance_2:
      name: "cell resistance 2"
      #entity_category: diagnostic
    cell_resistance_3:
      name: "cell resistance 3"
      #entity_category: diagnostic
    cell_resistance_4:
      name: "cell resistance 4"
      #entity_category: diagnostic
    cell_resistance_5:
      name: "cell resistance 5"
      #entity_category: diagnostic
    cell_resistance_6:
      name: "cell resistance 6"
      #entity_category: diagnostic
    cell_resistance_7:
      name: "cell resistance 7"
      #entity_category: diagnostic
    cell_resistance_8:
      name: "cell resistance 8"
      #entity_category: diagnostic
      

    
    # Temperatures
    power_tube_temperature:
      name: "FET temperature"
    temperature_sensor_1:
      name: "temperature sensor 1"
    temperature_sensor_2:
      name: "temperature sensor 2"
    
    # Electrical measurements
    total_voltage:
      name: "total voltage"
      id: pack_voltage
    current:
      name: "current"
      id: pack_current
    power:
      name: "power"
      id: power_signed
    # charging_power:
    #   name: "charging power"
    # discharging_power:
    #   name: "discharging power"
    
    # Battery status
    capacity_remaining:
      name: "capacity remaining"
      id: capacity_remaining_ah
    total_battery_capacity_setting:
      name: "total battery capacity setting"
      #entity_category: diagnostic
      id: capacity_setting_ah
    charging_cycles:
      name: "charging cycles"
      #entity_category: diagnostic
    total_charging_cycle_capacity:
      name: "total charging cycle capacity"
      #entity_category: diagnostic
    state_of_charge:
      name: "state of charge"
      id: soc_percent
    
    # Protection settings (read-only sensors)
    errors_bitmask:
      name: "errors bitmask"
      #entity_category: diagnostic
    balancing_current:
      name: "balancing current"
      #entity_category: diagnostic
    total_runtime:
      name: "total runtime"
      #entity_category: diagnostic
    
  # System information diagnostic sensors
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s
    device_class: "signal_strength"
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    device_class: "signal_strength"
    entity_category: diagnostic

  # Smoothened power for more stable ETAs ?
  - platform: copy
    source_id: power_signed
    name: "Power Smoothed Fast"
    id: power_smoothed_fast
    internal: true
    filters:
      - sliding_window_moving_average:
          window_size: 12   # ~2 min at 10s updates
          send_every: 1
          send_first_at: 1
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
  - platform: copy
    source_id: power_signed
    name: "Power Smoothed Slow"
    id: power_smoothed_slow
    internal: true
    filters:
      - sliding_window_moving_average:
          window_size: 60   # ~10 min at 10s updates
          send_every: 1
          send_first_at: 1
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement



  # ETA estimates based on power instead of current
  - platform: template
    name: "Time To Empty"
    id: time_to_empty_hours
    unit_of_measurement: "h"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 2
    lambda: |-
      const float p_fast = id(power_smoothed_fast).state;  // W
      const float p_slow = id(power_smoothed_slow).state;  // W
      const float cap_rem = id(capacity_remaining_ah).state;  // Ah
      const float volt = id(pack_voltage).state;       // V
      const float min_p = ${eta_min_power_w}; // Minimum meaningful power
      const float pack_energy = cap_rem * volt;  // Remaining energy in Wh

      if (!std::isfinite(p_fast) || !std::isfinite(p_slow) || !std::isfinite(cap_rem) || !std::isfinite(volt)) return NAN;

      // Blend fast/slow windows to soften spikes but react within minutes
      float p = 0.6f * p_slow + 0.4f * p_fast;
      if (p > -min_p) return NAN; // Not discharging meaningfully

      const float hours = pack_energy / -p;  // remaining Wh divided by discharge W
      if (!std::isfinite(hours) || hours < 0) return NAN;
      return hours;

  - platform: template
    name: "Time To Full"
    id: time_to_full_hours
    unit_of_measurement: "h"
    device_class: duration
    state_class: measurement
    accuracy_decimals: 2
    lambda: |-
      const float p_fast = id(power_smoothed_fast).state;  // W
      const float p_slow = id(power_smoothed_slow).state;  // W
      const float cap_rem = id(capacity_remaining_ah).state;  // Ah
      const float volt = id(pack_voltage).state;       // V
      const float min_p = ${eta_min_power_w}; // Minimum meaningful power
      const float pack_energy = cap_rem * volt;  // Remaining energy in Wh
      const float pack_energy_full = id(capacity_setting_ah).state * 8 * 3.25;  // Full energy in Wh

      if (!std::isfinite(p_fast) || !std::isfinite(p_slow) || !std::isfinite(cap_rem) || !std::isfinite(volt)) return NAN;

      float p = 0.6f * p_slow + 0.4f * p_fast;

      if (p < min_p) return NAN;  // Not charging meaningfully

      const float missing_energy = pack_energy_full - pack_energy;  // Energy needed to full charge in Wh
      if (missing_energy <= 0) return NAN;

      const float hours = missing_energy / p;  // Wh needed divided by charge W
      if (!std::isfinite(hours) || hours < 0) return NAN;
      return hours;




  - platform: internal_temperature
    name: "Internal Temperature"
    entity_category: diagnostic
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic

