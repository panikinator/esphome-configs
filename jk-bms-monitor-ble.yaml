
substitutions:
  name: jk-bms-ble
  device_description: "Monitor and control a JK-BMS via BLE"
  external_components_source: github://syssi/esphome-jk-bms@main
  bms_mac_address: C8:47:80:42:5A:33
  eta_min_current_a: "0.25"        # Ignore ETAs when |I| is below this (A)
  eta_max_hours: "72"             # Cap ETA to avoid absurd values
  eta_min_power_w: "10"          # Minimum meaningful power for ETA calculations (W)
  # Protocol version options: JK02_24S, JK02_32S, JK04
  # JK02_24S: For most common JK-BMS models (up to 24 cells)
  # JK02_32S: For newer models with 32S support (firmware v11+)
  # JK04: For older JK-B2A16S models
  protocol_version: JK02_32S
  bms_model: "JK-B1A8S10P"  # for future reference only

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "syssi.esphome-jk-bms"
    version: 2.4.0
  platformio_options:
    build_flags: 
      - -DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
  # compile_process_limit: 4

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced: 
      minimum_chip_revision: "3.1"

external_components:
  - source: ${external_components_source}
    refresh: 3600s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  on_disconnect: 
    then:
      - switch.turn_off: ble_connection_switch
  on_connect: 
    then:
      - switch.turn_on: ble_connection_switch

logger:
  level: INFO

api:
  encryption: 
    key: !secret default_native_api_encryption_key

ota:
  - platform: esphome
    id: my_ota
    password: !secret default_ota_password
    # Automatically disconnect BLE during OTA to prevent issues
    on_begin:
      then:
        - switch.turn_off: ble_connection_switch
        - logger.log: "BLE connection suspended for OTA update"

# BLE tracker and client setup
esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 30ms
    active: false

ble_client:
  - mac_address: ${bms_mac_address}
    id: bms_client
    # Auto-connect on boot
    # auto_connect: true

jk_bms_ble:
  - id: bms0
    ble_client_id: bms_client
    protocol_version: ${protocol_version}
    throttle: 5s  # Update interval
    update_interval: 10s

# ============================================================================
# BINARY SENSORS - Status indicators
# ============================================================================
binary_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    balancing:
      name: "balancing"
      #entity_category: diagnostic
    charging:
      name: "charging"
    discharging:
      name: "discharging"
    online_status:
      name: "online status"
    heating:
      name: "heating"


# ============================================================================
# SENSORS - Monitoring data
# ============================================================================
sensor:
