esphome:
  name: halogen-heater
  friendly_name: Halogen Heater

esp32:
  board: lolin_s2_mini
  framework:
    type: esp-idf
  variant: ESP32S2

logger:

api:
  encryption:
    key: !secret default_native_api_encryption_key

ota:
  - platform: esphome
    id: my_ota
    password: !secret default_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Halogen-Heater Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

# One-wire bus for DS18B20 on GPIO4
one_wire:
  - platform: gpio
    pin: GPIO14
    id: onewire_bus

sensor:
  - platform: dallas_temp
    one_wire_id: onewire_bus
    name: "Heater Temperature"
    id: heater_temp
    update_interval: 2s        # faster updates
    accuracy_decimals: 2        # finer resolution
    resolution: 12              # DS18B20 full resolution (750ms conv time)
    filters:
      - clamp:
          min_value: -40
          max_value: 125
    
  - platform: template
    name: "Heater PWM Percent"
    id: heater_pwm_percent_sensor
    unit_of_measurement: "%"

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    device_class: signal_strength
    entity_category: diagnostic
  - platform: copy
    name: "WiFi Signal Percent"
    source_id: wifi_signal_db
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    device_class: signal_strength
    entity_category: diagnostic
  - platform: internal_temperature
    name: "Internal Temperature"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Uptime"
    update_interval: 120s
    entity_category: diagnostic

# PWM output to MOSFET gate on GPIO3
output:
  - platform: ledc
    id: heater_pwm_raw
    pin: GPIO16
    frequency: 100 Hz  # smoother than 100 Hz; adjust if needed
    max_power: 1.0

  - platform: template
    id: heater_pwm
    type: float
    write_action:
      - lambda: |-
          id(heater_pwm_raw).set_level(state);
          id(heater_pwm_percent_sensor).publish_state(state*100.0f);
          ESP_LOGI("heater",
                   "Duty=%.1f%%",
                   state*100.0f);

# Raw PWM slider (as a light dimmer) for manual testing
light:
  - platform: monochromatic
    id: heater_pwm_light
    name: "Heater PWM Test"
    output: heater_pwm
    default_transition_length: 0s
    gamma_correct: 1.0  # linear

# Climate block removed for testing; re-enable later if desired
climate:
  - platform: pid
    id: pid_climate
    name: "Halogen Heater"
    sensor: heater_temp
    default_target_temperature: 60 °C
    heat_output: heater_pwm
    control_parameters:
      kp: 0.22635
      ki: 0.00314
      kd: 4.08005
    deadband_parameters:
      threshold_high: 0.5 °C
      threshold_low: -0.5 °C
    visual:
      min_temperature: 30 °C
      max_temperature: 80 °C
      temperature_step: 0.5 °C

button:
  - platform: template
    name: "PID Climate Autotune"
    on_press:
      - climate.pid.autotune: pid_climate

# Common diagnostics
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
  - platform: version
    name: "ESPHome Version"
