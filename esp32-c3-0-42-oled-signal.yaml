substitutions:
  name: esp32-c3-0-42-oled-signal
  device_description: "ESP32-C3 0.42 OLED signal strength monitor"
  i2c_sda: "5"
  i2c_scl: "6"
  oled_address: "0x3C"
  # Display is 72x40 mapped into a 128x64 SSD1306 buffer
  oled_offset_x: "30"
  oled_offset_y: "12"

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "custom.esp32-c3-0-42-oled-signal"
    version: "1.0.0"

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

wifi:
  networks:
    - ssid: !secret wifi_alt_ssid
      password: !secret wifi_alt_password
      priority: 32
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "ESP32-C3 OLED Fallback"
    password: !secret fallback_ap_password

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret default_native_api_encryption_key

ota:
  - platform: esphome
    password: !secret default_ota_password

# ==========================================================================
# I2C + DISPLAY
# ==========================================================================
i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  frequency: 400kHz

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_large
    size: 20

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: ${oled_address}
    id: oled
    offset_x: ${oled_offset_x}
    offset_y: ${oled_offset_y}
    update_interval: 2s
    lambda: |-
      it.fill(COLOR_OFF);
      it.printf(0, 0, id(font_small), "WiFi RSSI");
      if (id(wifi_signal_db).has_state()) {
        it.printf(0, 16, id(font_large), "%.0f dBm", id(wifi_signal_db).state);
      } else {
        it.printf(0, 16, id(font_large), "-- dBm");
      }
      if (id(wifi_signal_percent).has_state()) {
        it.printf(0, 38, id(font_small), "%.0f %%", id(wifi_signal_percent).state);
      }

# ==========================================================================
# SENSORS - Signal strength + diagnostics
# ==========================================================================
sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 30s
    device_class: "signal_strength"
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    id: wifi_signal_percent
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    device_class: "signal_strength"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "Internal Temperature"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic

# ==========================================================================
# TEXT SENSORS - Network info
# ==========================================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic

  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic

# ==========================================================================
# LED + BUTTONS
# ==========================================================================
output:
  - platform: gpio
    pin: 8
    id: onboard_led
    inverted: true

light:
  - platform: binary
    output: onboard_led
    name: "Onboard LED"
    entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: safe_mode
    name: "Safe Mode"
    entity_category: diagnostic
